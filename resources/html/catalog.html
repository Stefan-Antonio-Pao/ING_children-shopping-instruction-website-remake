<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>课程目录｜儿童购物游戏教学网站</title>
    <!-- Import CSS Stylesheet -->
    <link rel="stylesheet" type="text/css" href="../css/general/page-settings.css">
    <link rel="stylesheet" type="text/css" href="../css/general/card-layout.css">
    <!-- Import JavaScript -->
    <script src="../javascript/general/page-cleaner.js"></script>
    <script src="../javascript/sections/settings/voice-setting/voice-core.js"></script>
    <script src="../javascript/general/page-reader.js"></script>
</head>

<body>
<!-- Accessibility: Page Reader Text -->
<reader style="display: none" id="page-reader-text">
    欢迎来到课程目录！
    在这里你可以选择教学内容或练习内容。
</reader>

<div class="page-container">
    <!-- Toolbar -->
    <div class="toolbar">
        <button id="play-page-btn" class="toolbar-btn" title="朗读页面">读</button>
    </div>

    <!-- Header -->
    <nav class="navbar">
        <a href="../index.html" class="nav-item">首页</a>
        <a href="settings.html" class="nav-item">设置</a>
        <a href="catalog.html" class="nav-item active">课程目录</a>
        <a href="rewards.html" class="nav-item">奖励</a>
        <a href="contact-us.html" class="nav-item">联系我们</a>
    </nav>

    <!-- Title -->
    <h1 class="main-title">课程目录</h1>

    <!-- Main -->
    <main class="content-card">
        <div class="card-grid">
            <!-- Left Card - Teaching -->
            <div class="card-item" onclick="window.location.href='courses/teaching/teaching-catalog.html'">
                <div class="card-image">
                    <img src="../assets/images/study-tools/notebook.jpg" alt="教学内容">
                </div>
                <div class="card-text">教学课程</div>
            </div>

            <!-- Right Card - Exercises -->
            <div class="card-item" onclick="window.location.href='courses/exercises/exercises-catalog.html'">
                <div class="card-image">
                    <img src="../assets/images/study-tools/pencil.jpg" alt="练习内容">
                </div>
                <div class="card-text">练习与应用</div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <button class="end-btn" onclick="window.location.href='../index.html'">返回首页</button>
    </footer>
</div>
</body>
</html>
