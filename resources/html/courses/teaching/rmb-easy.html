<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>认识人民币 - 基础认识</title>
    <link rel="stylesheet" href="../../../css/general/page-settings.css">
    <link rel="stylesheet" href="../../../css/general/card-layout.css">
    <style>
        /* Additional styles based on yuan-100-learning.html */
        .rmb-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        .rmb-item {
            text-align: center;
            background: white;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .rmb-img {
            width: 200px;
            height: auto;
            border-radius: 5px;
        }
        .color-label {
            font-size: 18px;
            font-weight: bold;
            margin-top: 10px;
        }
        .color-red { color: #c0392b; }
        .color-blue { color: #2980b9; }
        .color-green { color: #27ae60; }
        .color-yellow { color: #f39c12; }
        .color-purple { color: #9b59b6; }
    </style>
</head>
<body>
    <div class="toolbar">
        <button class="toolbar-btn" onclick="history.back()">←</button>
    </div>
    <div class="page-container">
        <div class="navbar">
            <a href="../exercises/exercises-catalog.html" class="nav-item">返回目录</a>
        </div>
        <div class="content-card">
            <h1>认识人民币 - 基础认识</h1>
            <p>通过颜色认识人民币的不同面值</p>
            <div class="rmb-container">
                <div class="rmb-item">
                    <img src="../../../assets/images/rmbs/sides/double/yuan-1.png" alt="1元人民币" class="rmb-img">
                    <div class="color-label color-green">绿色 - 1元</div>
                </div>
                <div class="rmb-item">
                    <img src="../../../assets/images/rmbs/sides/double/yuan-5.png" alt="5元人民币" class="rmb-img">
                    <div class="color-label color-purple">紫色 - 5元</div>
                </div>
                <div class="rmb-item">
                    <img src="../../../assets/images/rmbs/sides/double/yuan-10.png" alt="10元人民币" class="rmb-img">
                    <div class="color-label color-yellow">黄色 - 10元</div>
                </div>
                <div class="rmb-item">
                    <img src="../../../assets/images/rmbs/sides/double/yuan-20.png" alt="20元人民币" class="rmb-img">
                    <div class="color-label color-blue">蓝色 - 20元</div>
                </div>
                <div class="rmb-item">
                    <img src="../../../assets/images/rmbs/sides/double/yuan-50.png" alt="50元人民币" class="rmb-img">
                    <div class="color-label color-green">绿色 - 50元</div>
                </div>
                <div class="rmb-item">
                    <img src="../../../assets/images/rmbs/elements/portraits/yuan-100.jpg" alt="100元人民币" class="rmb-img">
                    <div class="color-label color-red">红色 - 100元</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
