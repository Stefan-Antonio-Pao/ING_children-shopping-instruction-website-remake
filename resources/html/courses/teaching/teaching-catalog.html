<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>教学课程目录｜儿童购物游戏教学网站</title>
    <!-- Import CSS Stylesheet -->
    <link rel="stylesheet" type="text/css" href="../../../css/general/page-settings.css">
    <link rel="stylesheet" type="text/css" href="../../../css/sections/courses/course-catalog.css">
    <!-- Import JavaScript -->
    <script src="../../../javascript/general/page-reader.js"></script>
    <script src="../../../javascript/course-catalog.js"></script>
</head>

<body>
<!-- Accessibility: Page Reader Text -->
<reader style="display: none" id="page-reader-text">
    欢迎来到教学课程目录！
    在这里你可以选择不同的教学内容来学习购物知识。
    左侧显示了所有可用的教学课程，右侧显示对应课程的难度等级。
</reader>

<div class="page-container">
    <!-- Toolbar -->
    <div class="toolbar">
        <button id="play-page-btn" class="toolbar-btn" title="朗读页面">读</button>
    </div>

    <!-- Header -->
    <nav class="navbar">
        <a href="../../homepage.html" class="nav-item">首页</a>
        <a href="../../settings.html" class="nav-item">设置</a>
        <a href="../../catalog.html" class="nav-item active">课程目录</a>
        <a href="../../rewards.html" class="nav-item">奖励</a>
        <a href="../../contact-us.html" class="nav-item">联系我们</a>
    </nav>

    <!-- Title -->
    <h1 class="main-title">教学课程目录</h1>

    <!-- Main -->
    <main class="content-card">
        <!-- Course Catalog Content -->
        <div class="course-catalog-content">
            <!-- Left Sidebar - Course List -->
            <div class="course-sidebar">
                <!-- Courses will be dynamically added by JavaScript -->
            </div>

            <!-- Right Content - Difficulty Levels -->
            <div class="difficulty-content">
                <!-- Difficulty Grid -->
                <div class="difficulty-grid">
                    <!-- Difficulty cards will be dynamically added by JavaScript -->
                </div>

                <!-- Difficulty Description Display - Below selected difficulty -->
                <div class="difficulty-description-container" style="display: none;">
                    <div class="difficulty-description-box">
                        <p id="selected-difficulty-description" class="selected-difficulty-description"></p>
                    </div>
                    <button id="start-course-btn" class="start-course-btn">开始学习</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <button class="end-btn" onclick="window.location.href='../../catalog.html'">返回课程目录</button>
    </footer>
</div>
</body>
</html>
