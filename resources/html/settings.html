<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>设置｜儿童购物游戏教学网站</title>
    <!-- Import CSS Stylesheet -->
    <link rel="stylesheet" type="text/css" href="../css/general/page-settings.css">
    <link rel="stylesheet" type="text/css" href="../css/general/card-layout.css">
    <link rel="stylesheet" type="text/css" href="../css/sections/settings.css">
    <!-- Import JavaScript -->
    <script src="../javascript/general/page-cleaner.js"></script>
    <script src="../javascript/voice-setting/voice-core.js"></script>
    <script src="../javascript/general/page-reader.js"></script>
</head>

<body>
<!-- Accessibility: Page Reader Text -->
<reader style="display: none" id="page-reader-text">
    欢迎来到设置页面！
    在这里你可以选择语音设置或导览角色设置。
</reader>

<div class="page-container">
    <!-- Toolbar -->
    <div class="toolbar">
        <button id="clear-data-btn" class="toolbar-btn" title="清除数据">X</button>
        <button id="play-page-btn" class="toolbar-btn" title="朗读页面">读</button>
    </div>

    <!-- Header -->
    <nav class="navbar">
        <a href="homepage.html" class="nav-item">首页</a>
        <a href="settings.html" class="nav-item active">设置</a>
        <a href="catalog.html" class="nav-item">课程目录</a>
        <a href="rewards.html" class="nav-item">奖励</a>
        <a href="contact-us.html" class="nav-item">联系我们</a>
    </nav>

    <!-- Title -->
    <h1 class="main-title">设置</h1>

    <!-- Main -->
    <main class="content-card">
        <div class="card-grid">
            <!-- Left Card - Voice Settings -->
            <div class="card-item" onclick="window.location.href='settings/voice-settings.html'">
                <div class="card-image">
                    <img src="../assets/images/sundry/bear-uncle.png" alt="语音设置">
                </div>
                <div class="card-text">智能语音设置</div>
            </div>

            <!-- Right Card - Director Settings -->
            <div class="card-item" onclick="window.location.href='settings/director-settings.html'">
                <div class="card-image">
                    <img src="../assets/images/directors/bear.png" alt="人物选择">
                </div>
                <div class="card-text">导览角色设置</div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <button class="end-btn" onclick="window.location.href='catalog.html'">查看课程</button>
    </footer>
</div>
</body>
</html>
